<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N-Dimensional Arrow Grid</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="#sim-controls" class="skip-link">Skip to simulation controls</a>

  <div class="layout">
    <!-- Left panel — Entity Palette + Dim Mapping -->
    <aside class="panel left-panel" aria-label="Entity palette and dimension mapping">
      <h2>Entity Palette</h2>
      <div id="entity-palette" role="group" aria-label="Entity creation tools"></div>
      <hr class="panel-divider">
      <h2>Dimension Mapping</h2>
      <div id="dim-mapping" role="group" aria-label="Dimension channel assignments"></div>
    </aside>

    <!-- Center — 3D viewport + bottom bar -->
    <main class="center">
      <div id="viewport" role="img" aria-label="3D simulation viewport — click to place entities" tabindex="0"></div>

      <!-- Bottom bar — Simulation controls -->
      <div class="bottom-bar" id="sim-controls" role="toolbar" aria-label="Simulation controls">
        <div class="sim-buttons">
          <select id="preset-select" aria-label="Load a preset configuration"><option value="">— Preset —</option></select>
          <button id="step-btn" aria-label="Advance one step" title="Step (S)">Step</button>
          <button id="play-btn" aria-label="Start continuous playback" title="Play (Space)">Play</button>
          <button id="pause-btn" aria-label="Pause playback" title="Pause (Space)">Pause</button>
          <button id="reset-btn" aria-label="Reset simulation" title="Reset (R)">Reset</button>
        </div>

        <div class="sim-sliders" role="group" aria-label="Simulation parameters">
          <label>Speed: <span id="speed-value" aria-hidden="true">1.0</span>
            <input type="range" id="speed-slider" min="0.1" max="5" value="1" step="0.1" aria-label="Simulation speed" aria-valuemin="0.1" aria-valuemax="5" aria-valuenow="1">
          </label>
          <label>Size: <span id="size-value" aria-hidden="true">8</span>
            <input type="range" id="size-slider" min="3" max="30" value="8" step="1" aria-label="Grid size" aria-valuemin="3" aria-valuemax="30" aria-valuenow="8">
          </label>
          <label>Dims: <span id="dim-value" aria-hidden="true">3</span>
            <input type="range" id="dim-slider" min="2" max="8" value="3" step="1" aria-label="Number of dimensions" aria-valuemin="2" aria-valuemax="8" aria-valuenow="3">
          </label>
        </div>

        <div id="slice-sliders" class="sim-sliders" role="group" aria-label="Slice position controls"></div>

        <div class="stats" aria-live="polite" aria-atomic="true">
          Step: <span id="step-count">0</span> &nbsp;|&nbsp;
          Entities: <span id="entity-count">0</span>
        </div>
      </div>
    </main>

    <!-- Right panel — Collision Rule Table -->
    <aside class="panel right-panel" aria-label="Collision rules configuration">
      <h2>Collision Rules</h2>
      <div id="collision-panel"></div>
    </aside>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
